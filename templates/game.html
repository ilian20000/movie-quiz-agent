<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Movie Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="game-body">

    <div class="chat-interface">
        <header class="chat-header">
            <a href="{{ url_for('index') }}" class="back-link">← Quit</a>
            <h2 class="agent-name">MOVIE QUIZ AGENT</h2>
        </header>

        <main class="chat-history" id="chatHistory">
            {% for msg in history %}
            <div class="message {{ msg.class }}">
                <span class="sender-name">{{ msg.sender }} :</span>
                <p>{{ msg.text }}</p>
            </div>
            {% endfor %}
        </main>

        <footer class="chat-input-area">
            <form id="chatForm" class="input-container">
                <input type="text" id="userInput" placeholder="Answer here to the agent..." autocomplete="off" required>
                <button type="submit" class="btn-send">SEND</button>
            </form>
        </footer>
    </div>


<script>
    const chatForm = document.getElementById('chatForm');
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Empêche le rechargement de la page
        
        const message = userInput.value;
        if (!message) return;

        addMessage(message, 'user-message', 'Vous');
        userInput.value = ''; 

        fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            data.forEach(msg => {
                addMessage(msg.text, 'ai-message', msg.sender);        
            });
        });
    });

    function addMessage(text, className, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', className);
        msgDiv.innerHTML = `<span class="sender-name">${sender} :</span><p>${text}</p>`;
        chatHistory.appendChild(msgDiv);
        
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>

</body>
</html>
